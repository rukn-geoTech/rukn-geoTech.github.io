  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e:0.92rem;font-weight:700;text-decoration:none;letter-spacing:0.01em;transition:color .25s;\" style-hover=\"color:var(--gold);\">中东及非洲<\u002Fa>\n      <a href=\"#advantage\" data-nav=\"advantage\" data-i18n=\"nav-advantage\" style=\"color:var(--text);font-size:0.92rem;font-weight:600;text-decoration:none;letter-spacing:0.01em;transition:color .25s;\" style-hover=\"color:var(--gold);\">技术与服务<\u002Fa>\n      <a href=\"#process\" data-nav=\"process\" data-i18n=\"nav-process\" style=\"color:var(--text);font-size:0.92rem;font-weight:600;text-decoration:none;letter-spacing:0.01em;transition:color .25s;\" style-hover=\"color:var(--gold);\">服务流程<\u002Fa>\n      <a href=\"#contact\" data-nav=\"contact\" data-i18n=\"nav-contact\" style=\"color:var(--text);font-size:0.92rem;font-weight:600;text-decoration:none;letter-spacing:0.01em;transition:color .25s;\" style-hover=\"color:var(--gold);\">联系方式<\u002Fa>\n      <button class=\"lang-switcher\" id=\"langSwitcher\" aria-label=\"Switch to English\" style=\"display:inline-flex;align-items:center;justify-content:center;min-width:46px;height:34px;padding:0 14px;background:transparent;border:1.5px solid var(--border);border-radius:20px;color:var(--navy2);font-size:0.8rem;font-weight:700;letter-spacing:0.04em;cursor:pointer;transition:all .25s;\" style-hover=\"border-color:var(--gold);color:var(--gold);background:var(--golddim);\">EN<\u002Fbutton>\n    <\u002Fnav>\n    <button class=\"nav-toggle\" id=\"navToggle\" aria-label=\"菜单\" style=\"display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;width:38px;height:38px;align-items:center;justify-content:center;\">\n      <span style=\"display:block;width:24px;height:2px;background:var(--navy);border-radius:2px;\"><\u002Fspan>\n      <span style=\"display:block;width:24px;height:2px;background:var(--navy);border-radius:2px;\"><\u002Fspan>\n      <span style=\"display:block;width:24px;height:2px;background:var(--navy);border-radius:2px;\"><\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fheader>\n\n  <section class=\"hero\" id=\"hero\" data-screen-label=\"Hero\" style=\"position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;background:linear-gradient(180deg,#f8fafc 0%,#eef2f7 55%,#e7edf3 100%);\">\n    <div class=\"hero-bg\" style=\"position:absolute;inset:0;z-index:0;\"><canvas id=\"heroCanvas\" style=\"display:block;width:100%;height:100%;\"><\u002Fcanvas><\u002Fdiv>\n    <div style=\"position:absolute;inset:0;z-index:0;background:radial-gradient(60% 50% at 50% 38%,rgba(58,123,213,0.06),transparent 70%);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"position:relative;z-index:1;max-width:880px;padding:0 22px;\">\n      <div style=\"display:inline-flex;align-items:center;gap:9px;padding:7px 16px;border:1px solid var(--border);border-radius:40px;background:rgba(255,255,255,0.6);margin-bottom:30px;\">\n        <span style=\"width:7px;height:7px;border-radius:50%;background:var(--gold);\"><\u002Fspan>\n        <span data-i18n=\"hero-kicker\" style=\"font-size:0.78rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--navy2);\">AI · 能源 · 中东及非洲<\u002Fspan>\n      <\u002Fdiv>\n      <h1 class=\"hero-h1\" data-i18n=\"hero-title\" style=\"font-family:'Sora',sans-serif;font-size:clamp(2.8rem,7vw,4.6rem);font-weight:800;letter-spacing:0.04em;color:var(--navy);margin-bottom:18px;line-height:1.05;\">基石智勘<\u002Fh1>\n      <p data-i18n=\"hero-subtitle\" style=\"font-size:clamp(1.05rem,2.4vw,1.4rem);color:var(--navy2);font-weight:500;letter-spacing:0.02em;margin-bottom:18px;\">AI驱动 · 能源智慧开发 · 中东非洲商务技术<\u002Fp>\n      <p data-i18n=\"hero-rukn-meaning\" style=\"font-size:0.96rem;color:var(--text);max-width:620px;margin:0 auto 38px;font-style:italic;\">Rukn（رُكْن），阿拉伯语「基石、支柱」之意，承载我们坚实的承诺——「勘」，不止于能源资源的实地勘探，更是对市场的精准细致勘察。<\u002Fp>\n      <div style=\"display:flex;gap:18px;justify-content:center;flex-wrap:wrap;\">\n        <a href=\"#business\" data-i18n=\"hero-btn-services\" style=\"padding:15px 36px;border-radius:40px;font-weight:700;font-size:1rem;text-decoration:none;background:var(--gold);color:#fff;transition:all .3s;box-shadow:0 10px 30px rgba(184,134,30,0.25);\" style-hover=\"background:#9a6f15;transform:translateY(-2px);\">了解我们的服务<\u002Fa>\n        <a href=\"#mea\" data-i18n=\"hero-btn-mea\" style=\"padding:15px 36px;border-radius:40px;font-weight:700;font-size:1rem;text-decoration:none;background:transparent;color:var(--navy2);border:1.6px solid var(--navy2);transition:all .3s;\" style-hover=\"background:var(--navy2);color:#fff;transform:translateY(-2px);\">中东及非洲业务<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"sec\" id=\"about\" data-screen-label=\"About\" style=\"padding:104px clamp(20px,5vw,48px);max-width:1180px;margin:0 auto;\">\n    <div class=\"reveal\" style=\"text-align:center;margin-bottom:60px;\">\n      <div data-i18n=\"about-kicker\" style=\"font-size:0.78rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;\">关于我们<\u002Fdiv>\n      <h2 data-i18n=\"about-title\" style=\"font-family:'Sora',sans-serif;font-size:clamp(2rem,4vw,2.7rem);font-weight:800;color:var(--navy);letter-spacing:-0.01em;margin-bottom:14px;\">能源资源勘查与评估<\u002Fh2>\n      <p data-i18n=\"about-subtitle\" style=\"color:var(--text);font-size:1.08rem;max-width:680px;margin:0 auto;\">人工智能时代 · 能源资源勘查与评估 · 高效开发技术服务<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"about-grid\" style=\"display:grid;grid-template-columns:1.15fr 0.85fr;gap:60px;align-items:center;\">\n      <div class=\"reveal\">\n        <h3 data-i18n=\"about-heading\" style=\"font-family:'Sora',sans-serif;font-size:1.5rem;color:var(--navy);margin-bottom:20px;font-weight:700;\">立足智能化升级风口，赋能传统能源开发提质增效<\u002Fh3>\n        <p data-i18n-html=\"about-p1\" style=\"color:var(--text);margin-bottom:16px;font-size:0.98rem;\">当前能源行业全面进入数字化、智能化、高效化转型新阶段。传统油气勘探开发模式面临复杂油气藏地质条件隐蔽、数据维度繁杂、人工建模精度有限等行业痛点。随着人工智能与大数据技术的快速迭代，AI 赋能已成为破解复杂油气藏勘探与高效开发难题的核心路径。<\u002Fp>\n        <p data-i18n-html=\"about-p2\" style=\"color:var(--text);margin-bottom:16px;font-size:0.98rem;\">基石智勘精准聚焦 <strong style=\"color:var(--navy2);\">人工智能时代矿产资源勘查与精细化评估赛道<\u002Fstrong>，定位为「技术驱动型、场景落地型」的高端矿产资源评价服务商。核心团队具备国内外顶级矿业企业及研究机构一线实战经验，深度联动多所高校科研资源，打通地质勘探 × 矿床模型 × 人工智能 × 算法研发技术壁垒，为固体矿产、经济金属等领域提供资源精细化评估、储量动态分析与开发决策优化，助力客户降本、提质、增效。<\u002Fp>\n        <p data-i18n-html=\"about-p3\" style=\"color:var(--text);font-size:0.98rem;\">公司始终秉持 <strong style=\"color:var(--navy2);\">「技术赋能、精准高效、务实共赢、长期深耕」<\u002Fstrong> 的核心服务理念，为油气行业高质量、低成本、精细化发展提供全新解决方案。<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"about-visual reveal\" style=\"display:flex;justify-content:center;align-items:center;\">\n        <div style=\"display:grid;grid-template-columns:repeat(3,84px);grid-template-rows:repeat(3,74px);gap:6px;\">\n          <div data-i18n=\"hex-ai\" style=\"width:84px;height:74px;background:var(--bgalt);border:1px solid var(--border);clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);display:flex;align-items:center;justify-content:center;font-family:'Sora';font-size:1.2rem;font-weight:600;color:var(--navy2);\">AI<\u002Fdiv>\n          <div data-i18n=\"hex-oilfield\" style=\"width:84px;height:74px;background:var(--bgalt);border:1px solid var(--border);clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:600;color:var(--navy2);\">油田<\u002Fdiv>\n          <div data-i18n=\"hex-data\" style=\"width:84px;height:74px;background:var(--bgalt);border:1px solid var(--border);clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:600;color:var(--navy2);\">数据<\u002Fdiv>\n          <div data-i18n=\"hex-geology\" style=\"width:84px;height:74px;background:var(--bgalt);border:1px solid var(--border);clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:600;color:var(--navy2);\">地质<\u002Fdiv>\n          <div data-i18n=\"hex-cornerstone\" style=\"width:84px;height:74px;background:rgba(184,134,30,0.14);border:1.5px solid var(--gold);clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);display:flex;align-items:center;justify-content:center;font-size:1.15rem;font-weight:700;color:var(--gold);\">矿产<\u002Fdiv>\n          <div data-i18n=\"hex-model\" style=\"width:84px;height:74px;background:var(--bgalt);border:1px solid var(--border);clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:600;color:var(--navy2);\">模型<\u002Fdiv>\n          <div data-i18n=\"hex-algorithm\" style=\"width:84px;height:74px;background:var(--bgalt);border:1px solid var(--border);clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:600;color:var(--navy2);\">算法<\u002Fdiv>\n          <div data-i18n=\"hex-explore\" style=\"width:84px;height:74px;background:var(--bgalt);border:1px solid var(--border);clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:600;color:var(--navy2);\">勘查<\u002Fdiv>\n          <div data-i18n=\"hex-energy\" style=\"width:84px;height:74px;background:var(--bgalt);border:1px solid var(--border);clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:600;color:var(--navy2);\">能源<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mea-feature reveal\" style=\"display:grid;grid-template-columns:0.85fr 1.15fr;gap:56px;align-items:center;margin-top:90px;padding-top:72px;border-top:1px solid var(--border);\">\n      <div style=\"position:relative;border-radius:18px;overflow:hidden;background:linear-gradient(140deg,rgba(184,134,30,0.07) 0%,rgba(58,123,213,0.05) 100%),var(--bg);border:1px solid var(--border);min-height:300px;display:flex;flex-direction:column;justify-content:flex-end;padding:34px;\">\n        <div style=\"position:absolute;top:30px;left:34px;width:58px;height:58px;display:flex;align-items:center;justify-content:center;background:var(--golddim);clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);\">\n          <div style=\"width:24px;height:24px;background:var(--gold);clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:relative;\">\n          <div data-i18n=\"mea-feature-stat-num\" style=\"font-family:'Sora';font-size:1.85rem;font-weight:800;color:var(--navy);line-height:1.15;\">非洲本土团队<\u002Fdiv>\n          <div data-i18n=\"mea-feature-stat-label\" style=\"font-size:0.92rem;color:var(--text);margin-top:10px;\">扎根当地 · 强力运作 · 全链条赋能<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h3 data-i18n=\"about-heading-mea\" style=\"font-family:'Sora',sans-serif;font-size:1.5rem;color:var(--navy);margin-bottom:20px;font-weight:700;\">深耕中东及非洲市场，提供全链条商务与技术赋能<\u002Fh3>\n        <p data-i18n-html=\"about-p4\" style=\"color:var(--text);margin-bottom:22px;font-size:0.98rem;\">在中非合作迈向「产业链共兴」与「本地化运营」的新阶段，跨境投资与资源开发面临着信息壁垒、合规风险及文化差异等多重挑战。为此，我们全面拓展中东及非洲市场商务服务，依托 <strong style=\"color:var(--navy2);\">扎根当地的非洲本土团队强力运作<\u002Fstrong>，将技术服务与商务落地深度融合，为企业出海提供从前期调研到后期运营的一站式解决方案。<\u002Fp>\n        <a href=\"#mea\" data-i18n=\"mea-link\" style=\"display:inline-flex;align-items:center;gap:8px;font-weight:700;color:var(--gold);text-decoration:none;font-size:0.98rem;\" style-hover=\"gap:14px;\">查看中东及非洲业务 →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"sec\" id=\"business\" data-screen-label=\"Business\" style=\"padding:104px clamp(20px,5vw,48px);background:var(--bgalt);\">\n    <div style=\"max-width:1180px;margin:0 auto;\">\n      <div class=\"reveal\" style=\"text-align:center;margin-bottom:60px;\">\n        <div data-i18n=\"business-kicker\" style=\"font-size:0.78rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;\">技术开发<\u002Fdiv>\n        <h2 data-i18n=\"business-title\" style=\"font-family:'Sora',sans-serif;font-size:clamp(2rem,4vw,2.7rem);font-weight:800;color:var(--navy);letter-spacing:-0.01em;margin-bottom:14px;\">技术开发<\u002Fh2>\n        <p data-i18n=\"business-subtitle\" style=\"color:var(--text);font-size:1.08rem;max-width:680px;margin:0 auto;\">覆盖油气勘探开发全流程 · 延伸矿业资源智能评估<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"biz-grid\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;\">\n        <div class=\"reveal\" style=\"background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:34px 28px;transition:transform .3s,box-shadow .3s,border-color .3s;\" style-hover=\"transform:translateY(-6px);box-shadow:0 18px 44px rgba(13,33,55,0.1);border-color:rgba(184,134,30,0.4);\">\n          <div style=\"width:52px;height:52px;display:flex;align-items:center;justify-content:center;background:var(--golddim);color:var(--gold);font-family:'Sora';font-weight:700;font-size:1.05rem;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);margin-bottom:20px;\">01<\u002Fdiv>\n          <h3 data-i18n=\"biz-1-title\" style=\"font-family:'Sora';font-size:1.15rem;font-weight:700;margin-bottom:10px;color:var(--navy);\">能源资源智能化勘查<\u002Fh3>\n          <p data-i18n=\"biz-1-desc\" style=\"font-size:0.92rem;color:var(--text);line-height:1.65;\">油气领域，着重精细化评估与储量分析，运用 AI 技术对复杂油气藏进行精准勘查和资源评估。矿业领域突破传统地质找矿单一技术局限，打通地质勘探 × 矿床模型 × 人工智能 × 算法研发技术壁垒，为固体矿产、经济金属等领域提供资源精细化评估。<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"reveal\" style=\"background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:34px 28px;transition:transform .3s,box-shadow .3s,border-color .3s;\" style-hover=\"transform:translateY(-6px);box-shadow:0 18px 44px rgba(13,33,55,0.1);border-color:rgba(184,134,30,0.4);\">\n          <div style=\"width:52px;height:52px;display:flex;align-items:center;justify-content:center;background:var(--golddim);color:var(--gold);font-family:'Sora';font-weight:700;font-size:1.05rem;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);margin-bottom:20px;\">02<\u002Fdiv>\n          <h3 data-i18n=\"biz-2-title\" style=\"font-family:'Sora';font-size:1.15rem;font-weight:700;margin-bottom:10px;color:var(--navy);\">地质建模与数模优化<\u002Fh3>\n          <p data-i18n=\"biz-2-desc\" style=\"font-size:0.92rem;color:var(--text);line-height:1.65;\">既深耕复杂油气藏地质建模、油藏数值模拟等传统业务，构建高精度三维地质模型，精准预测开发动态；又协助客户将 AI 技术融入现有工作流程，推动业务流程智能化升级，提质增效。<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"reveal\" style=\"background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:34px 28px;transition:transform .3s,box-shadow .3s,border-color .3s;\" style-hover=\"transform:translateY(-6px);box-shadow:0 18px 44px rgba(13,33,55,0.1);border-color:rgba(184,134,30,0.4);\">\n          <div style=\"width:52px;height:52px;display:flex;align-items:center;justify-content:center;background:var(--golddim);color:var(--gold);font-family:'Sora';font-weight:700;font-size:1.05rem;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);margin-bottom:20px;\">03<\u002Fdiv>\n          <h3 data-i18n=\"biz-3-title\" style=\"font-family:'Sora';font-size:1.15rem;font-weight:700;margin-bottom:10px;color:var(--navy);\">实验室分析化验<\u002Fh3>\n          <p data-i18n=\"biz-3-desc\" style=\"font-size:0.92rem;color:var(--text);line-height:1.65;\">配备高压物性、岩心CT扫描、自动化孢粉分析、酸泡分析等全套大型实验设备，依托资深专业的实验技术人员，全面承接油气田、陆地煤层勘探开发领域岩心、油、水、气等样品检测分析工作，输出科学、严谨、权威的分析化验成果报告。<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"reveal\" style=\"background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:34px 28px;transitio stat-label\":\"扎根当地 · 强力运作 · 全链条赋能\",\n        \"about-heading-mea\":\"深耕中东及非洲市场，提供全链条商务与技术赋能\",\n        \"about-p4\":\"在中非合作迈向「产业链共兴」与「本地化运营」的新阶段，跨境投资与资源开发面临着信息壁垒、合规风险及文化差异等多重挑战。为此，我们全面拓展中东及非洲市场商务服务，依托 <strong style=\\\"color:var(--navy2)\\\">扎根当地的非洲本土团队强力运作<\u002Fstrong>，将技术服务与商务落地深度融合，为企业出海提供从前期调研到后期运营的一站式解决方案。\",\n        \"about-p5\":\"我们的中东及非洲业务涵盖四大核心领域：<strong style=\\\"color:var(--gold)\\\">精准市场调研<\u002Fstrong>（提供权威政策导航、产业数据及营商环境评估）、<strong style=\\\"color:var(--gold)\\\">深度商务合作<\u002Fstrong>（涵盖跨文化沟通、本地合规指导、招投标对接及属地化伙伴匹配）、<strong style=\\\"color:var(--gold)\\\">项目投资服务<\u002Fstrong>（从项目可研、风险防控到投融资对接的全周期陪跑），以及 <strong style=\\\"color:var(--gold)\\\">属地化技术支持<\u002Fstrong>（协助中国技术标准落地与本地技术团队培训）。\",\n        \"about-p6\":\"通过「技术输出 + 本土赋能」的创新模式，我们不仅是资源的勘探者，更是中非经贸合作的「陪跑者」。我们致力于消除信息鸿沟，降低跨境运营成本，助力客户在复杂多变的国际市场中精准把握商机，实现真正的务实共赢与长期深耕。\",\n        \"mea-link\":\"查看中东及非洲业务 →\",\"mea-kicker\":\"中东及非洲 · MIDDLE EAST & AFRICA\",\"mea-title\":\"中东及非洲商务技术服务\",\"mea-subtitle\":\"扎根本土团队 · 技术输出 + 本土赋能 · 中非经贸合作的「陪跑者」\",\n        \"mea-area-1-title\":\"精准市场调研\",\"mea-area-1-desc\":\"提供权威政策导航、产业数据及营商环境评估，助您看清市场全貌、把握机遇。\",\n        \"mea-area-2-title\":\"深度商务合作\",\"mea-area-2-desc\":\"涵盖跨文化沟通、本地合规指导、招投标对接及属地化伙伴匹配。\",\n        \"mea-area-3-title\":\"项目投资服务\",\"mea-area-3-desc\":\"从项目可研、风险防控到投融资对接的全周期陪跑。\",\n        \"mea-area-4-title\":\"属地化技术支持\",\"mea-area-4-desc\":\"协助中国技术标准落地与本地技术团队培训。\",\n        \"mea-pill-1\":\"非洲本土团队强力运作\",\"mea-pill-2\":\"技术输出 + 本土赋能\",\"mea-pill-3\":\"出海全周期陪跑\",\n        \"business-kicker\":\"技术开发\",\"business-title\":\"技术开发\",\"business-subtitle\":\"覆盖油气勘探开发全流程 · 延伸矿业资源智能评估\",\n        \"biz-1-title\":\"能源资源智能化勘查\",\"biz-1-desc\":\"油气领域，着重精细化评估与储量分析，运用 AI 技术对复杂油气藏进行精准勘查和资源评估。矿业领域突破传统地质找矿单一技术局限，打通地质勘探 × 矿床模型 × 人工智能 × 算法研发技术壁垒，为固体矿产、经济金属等领域提供资源精细化评估。\",\n        \"biz-2-title\":\"地质建模与数模优化\",\"biz-2-desc\":\"既深耕复杂油气藏地质建模、油藏数值模拟等传统业务，构建高精度三维地质模型，精准预测开发动态；又协助客户将 AI 技术融入现有工作流程，推动业务流程智能化升级，提质增效。\",\n        \"biz-3-title\":\"实验室分析化验\",\"biz-3-desc\":\"配备高压物性、岩心CT扫 ntact-title\":\"联系方式\",\"contact-subtitle\":\"期待与您的合作 · 共创智慧能源勘查新未来\",\"contact-address-label\":\"公司地址\",\"contact-address\":\"北京市密云区西田各庄镇雁密路99号601室\",\"contact-phone-label\":\"联系电话\",\"contact-email-label\":\"电子邮箱\",\"placeholder-1\":\"项目展示 · 复杂油气藏三维地质模型\",\"placeholder-2\":\"项目展示 · 中东及非洲资源与基建合作\",\n        \"form-heading\":\"给我们留言\",\"form-name\":\"姓名\",\"form-email\":\"邮箱\",\"form-message\":\"留言内容\",\"form-send\":\"发送留言\",\"form-name-placeholder\":\"请输入您的姓名\",\"form-email-placeholder\":\"请输入您的邮箱\",\"form-message-placeholder\":\"请描述您的需求或问题...\",\"form-success\":\"已收到您的留言！\",\n        \"footer-company\":\"北京基石智勘科技有限公司\",\"footer-copyright\":\"© 2024-2026 Rukn GeoExplore Technology limited company. All Rights Reserved.\",\n        \"lang-switch-to\":\"EN\"\n      },\n      en: {\n        \"nav-home\":\"Home\",\"nav-about\":\"About\",\"nav-business\":\"Tech Dev\",\"nav-mea\":\"MEA\",\"nav-advantage\":\"Advantages\",\"nav-process\":\"Process\",\"nav-contact\":\"Contact\",\n        \"hero-kicker\":\"AI · Energy · Middle East & Africa\",\"hero-title\":\"Rukn GeoExplore\",\"hero-subtitle\":\"AI-Driven · Smart Energy Development · MEA Business & Tech\",\"hero-rukn-meaning\":\"Rukn (رُكْن) — Arabic for \\\"pillar\\\" and \\\"cornerstone,\\\" carrying our steadfast commitment: to explore not only energy and resources in the field, but also markets — with precision and care.\",\"hero-btn-services\":\"Explore Our Services\",\"hero-btn-mea\":\"Middle East & Africa\",\n        \"about-kicker\":\"About Us\",\"about-title\":\"Energy Resource Exploration & Assessment\",\"about-subtitle\":\"AI-Era Energy Resource Exploration & Assessment · Efficient Development\",\"about-heading\":\"Empowering Traditional Energy Development Through Intelligent Upgrades\",\n        \"about-p1\":\"The energy industry is undergoing a full-scale transformation toward digitalization, intelligence, and efficiency. Traditional oil and gas exploration faces challenges such as complex reservoir conditions, multi-dimensional data complexity, and limited manual modeling accuracy. As AI and big data technologies rapidly evolve, AI empowerment has become the core pathway to solving the challenges of complex reservoir exploration and efficient development.\",\n        \"about-p2\":\"Rukn GeoExplore precisely targets the <strong style=\\\"color:var(--navy2)\\\">AI-era mineral resource exploration and refined assessment sector<\u002Fstrong>, positioning itself as a 'technology-driven, implementation-oriented' high-end mineral resource evaluation provider. Our core team brings frontline experience from top-tier domestic and international mining companies and research institutions, coupled with deep university research partnerships, integrating Geological Exploration × Ore Deposit Modeling × AI × Algorithm R&D to deliver refined resource assessment, dynamic reserve analysis, and development decision optimization for solid minerals and economic metals — helping clients reduce costs, improve quality, and enhance efficiency.\",\n        \"about-p3\":\"The company upholds the core philosophy of <strong style=\\\"color:var(--navy2)\\\">'Technology Empowerment, Precision & Efficiency, Pragmatic Win-Win, Long-Term Commitment'<\u002Fstrong>, delivering innovative solutions for high-quality, low-cost, refined development in the oil and gas industry.\",\n        \"hex-ai\":\"AI\",\"hex-oilfield\":\"Oilfield\",\"hex-data\":\"Data\",\"hex-geology\":\"Geology\",\"hex-cornerstone\":\"Minerals\",\"hex-model\":\"Model\",\"hex-algorithm\":\"Algorithm\",\"hex-explore\":\"Explore\",\"hex-energy\":\"Energy\",\n        \"mea-feature-kicker\":\"New Service\",\"mea-feature-stat-num\":\"Local African Team\",\"mea-feature-stat-label\":\"Rooted locally · Strong execution · Full-chain enablement\",\n        \"about-heading-mea\":\"Full-Chain Business & Tech Enablement Across the Middle East & Africa\",\n        \"about-p4\":\"As China-Africa cooperation advances toward 'industrial-chain co-prosperity' and 'localized operations,' cross-border investment and resource development face barriers of information asymmetry, compliance risk, and cultural difference. We have fully expanded our Middle East & Africa business services, powered by a <strong style=\\\"color:var(--navy2)\\\">strong, locally-rooted African team<\u002Fstrong>, deeply fusing technical services with on-the-ground business execution to deliver one-stop solutions for enterprises going global — from early-stage research to long-term operations.\",\n        \"about-p5\":\"Our Middle East & Africa practice spans four core areas: <strong style=\\\"color:var(--gold)\\\">Precise Market Research<\u002Fstrong> (authoritative policy navigation, industry data, and business-environment assessment), <strong style=\\\"color:var(--gold)\\\">In-Depth Business Cooperation<\u002Fstrong> (cross-cultural communication, local compliance guidance, bid/tender liaison, and localized partner matching), <strong style=\\\"color:var(--gold)\\\">Project Investment Services<\u002Fstrong> (full-cycle support from feasibility study and risk control to investment and financing), and <strong style=\\\"color:var(--gold)\\\">Localized Technical Support<\u002Fstrong> (helping Chinese technical standards take root and training local technical teams).\",\n        \"about-p6\":\"Through an innovative 'technology export + local empowerment' model, we are not only explorers of resources but 'co-runners' of China-Africa economic and trade cooperation. We work to close information gaps, lower cross-border operating costs, and help clients precisely seize opportunities in complex, fast-changing international markets — achieving pragmatic, lasting win-win partnerships.\",\n        \"mea-link\":\"Explore MEA Services →\",\"mea-kicker\":\"Middle East & Africa\",\"mea-title\":\"Middle East & Africa Business & Technology Services\",\"mea-subtitle\":\"Locally-Rooted Teams · Tech Export + Local Empowerment · Co-Runner of China-Africa Trade\",\n        \"mea-area-1-title\":\"Precise Market Research\",\"mea-area-1-desc\":\"Authoritative policy navigation, industry data, and business-environment assessment — see the full market picture and seize opportunities.\",\n        \"mea-area-2-title\":\"In-Depth Business Cooperation\",\"mea-area-2-desc\":\"Cross-cultural communication, local compliance guidance, bid/tender liaison, and localized partner matching.\",\n        \"mea-area-3-title\":\"Project Investment Services\",\"mea-area-3-desc\":\"Full-cycle support from feasibility study and risk control to investment and financing.\",\n        \"mea-area-4-title\":\"Localized Technical Support\",\"mea-area-4-desc\":\"Helping Chinese technical standards take root and training local technical teams.\",\n        \"mea-pill-1\":\"Strong locally-rooted African team\",\"mea-pill-2\":\"Tech export + local empowerment\",\"mea-pill-3\":\"Full-cycle go-global support\",\n        \"business-kicker\":\"Technology Development\",\"business-title\":\"Technology Development\",\"business-subtitle\":\"Full-Cycle Oil & Gas Exploration · Extended Mining Resource Assessment\",\n        \"biz-1-title\":\"Intelligent Exploration & Assessment\",\"biz-1-desc\":\"In oil and gas, we focus on refined assessment and reserve analysis, leveraging AI for accurate exploration and evaluation of complex reservoirs. In mining, we break through single-technique prospecting limits, integrating Geological Exploration × Ore Deposit Modeling × AI × Algorithm R&D for refined resource assessment of solid minerals and economic metals.\",\n        \"biz-2-title\":\"Geological Modeling & Simulation\",\"biz-2-desc\":\"From complex reservoir geological modeling and numerical simulation to helping clients integrate AI into existing workflows — we deliver high-precision 3D models that accurately predict development dynamics while driving intelligent process upgrades for better quality and efficiency.\",\n        \"biz-3-title\":\"Laboratory Analysis & Testing\",\"biz-3-desc\":\"Equipped with a full suite of major instruments — high-pressure PVT analysis, core CT scanning, automated palynological analysis, acid-digestion analysis and more — and backed by senior specialists, we provide comprehensive testing of core, oil, water, and gas samples for oilfield and onshore coalbed exploration, delivering rigorous, authoritative reports.\",\n        \"biz-4-title\":\"Oilfield Software Development\",\"biz-4-desc\":\"Leveraging rapidly evolving AI, we deliver tailored intelligent solutions for oil and gas exploration, deeply integrating AI into daily workflows to build dedicated 'small but effective' AI tools for teams. We custom-develop practical tools, AI assistants, and business apps — fast to build, simple to deploy, ready to use. No project too big or small.\",\n        \"biz-5-title\":\"Technical Consulting\",\"biz-5-desc\":\"Oil & gas technical consulting, joint R&D projects, and industry-academia collaboration. Full-process technical guidance and solution delivery.\",\n        \"biz-6-title\":\"Industry-Academia Cooperation\",\"biz-6-desc\":\"Deep collaboration with university research teams, building a 'research + practice' composite technical platform to industrialize cutting-edge technologies in the oil and gas sector.\",\n        \"adv-kicker\":\"Strengths\",\"adv-title\":\"Technical & Service Advantages\",\"adv-subtitle\":\"Technology Development × Localized MEA Service — a dual engine for client success\",\n        \"adv-1-title\":\"Frontline Technical Expertise\",\"adv-1-desc\":\"Our core team has hands-on experience from top-tier global energy companies, with years of expertise in oil and gas exploration, reservoir simulation, geological modeling, and mining resource assessment.\",\n        \"adv-2-title\":\"Multi-Disciplinary Integration\",\"adv-2-desc\":\"Breaking through the barriers between Geology + Reservoir Engineering + AI + Algorithm R&D, significantly improving exploration accuracy and development efficiency under complex geological conditions.\",\n        \"adv-3-title\":\"Localized Business Service\",\"adv-3-desc\":\"Powered by a strong, locally-rooted African team that deeply understands local policy, business environment, and culture — delivering cross-cultural communication, local compliance guidance, and localized partner matching.\",\n        \"adv-4-title\":\"Full-Cycle Go-Global Support\",\"adv-4-desc\":\"With a 'technology export + local empowerment' model, we provide one-stop support from market research and project investment to on-the-ground operations — driving pragmatic, lasting win-win partnerships.\",\n        \"proc-kicker\":\"Process\",\"proc-title\":\"Service Process\",\"proc-subtitle\":\"Technology Development & Business Service in parallel · Full-cycle refined support\",\"proc-track-1\":\"Technology Development Track\",\"proc-track-2\":\"Middle East & Africa Business Service Track\",\n        \"proc-1-title\":\"Requirements\",\"proc-1-desc\":\"In-depth understanding of client challenges and technical needs, clearly defining project objectives and scope.\",\"proc-2-title\":\"Solution Design\",\"proc-2-desc\":\"Customized technical solution design, combining AI with geoscience engineering for the optimal path.\",\"proc-3-title\":\"Development\",\"proc-3-desc\":\"Model construction, algorithm development, software customization — delivered iteratively in phases.\",\"proc-4-title\":\"Validation\",\"proc-4-desc\":\"Validation against real-world data to ensure model accuracy and solution feasibility.\",\"proc-5-title\":\"Delivery & Support\",\"proc-5-desc\":\"Results delivery, training, ongoing optimization, and long-term technical support.\",\"proc-b1-title\":\"Needs Alignment\",\"proc-b1-desc\":\"Define go-global goals, resource needs, and cooperation intent; establish communication.\",\"proc-b2-title\":\"Market Research\",\"proc-b2-desc\":\"Authoritative policy navigation, industry data, and business-environment assessment.\",\"proc-b3-title\":\"Business & Compliance\",\"proc-b3-desc\":\"Cross-cultural communication, local compliance, bid/tender liaison, and partner matching.\",\"proc-b4-title\":\"Investment & Execution\",\"proc-b4-desc\":\"Feasibility study, risk control, and investment/financing — driving projects on the ground.\",\"proc-b5-title\":\"Operations Support\",\"proc-b5-desc\":\"Localized technical support and local-team training, with long-term accompaniment.\",\n        \"contact-kicker\":\"Contact\",\"contact-title\":\"Contact Us\",\"contact-subtitle\":\"Looking Forward to Working with You\",\"contact-address-label\":\"Address\",\"contact-address\":\"Room 601, No. 99 Yanmi Road, Xitiangezhang Town, Miyun District, Beijing\",\"contact-phone-label\":\"Phone\",\"contact-email-label\":\"Email\",\"placeholder-1\":\"Project Showcase · 3D Reservoir Geological Model\",\"placeholder-2\":\"Project Showcase · MEA Resource & Infrastructure Cooperation\",\n        \"form-heading\":\"Send Us a Message\",\"form-name\":\"Name\",\"form-email\":\"Email\",\"form-message\":\"Message\",\"form-send\":\"Send\",\"form-name-placeholder\":\"Enter your name\",\"form-email-placeholder\":\"Enter your email\",\"form-message-placeholder\":\"Describe your needs or questions...\",\"form-success\":\"Submitted! We will contact you shortly.\",\n        \"footer-company\":\"Rukn GeoExplore Technology Limited Company\",\"footer-copyright\":\"© 2024-2026 Rukn GeoExplore Technology Limited Company. All Rights Reserved.\",\n        \"lang-switch-to\":\"中文\"\n      }\n    };\n    this.translations = translations;\n\n    let currentLang = localStorage.getItem('lang') || this.props.defaultLang || 'zh';\n\n    const applyLanguage = (lang) => {\n      const t = translations[lang];\n      if (!t) return;\n      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';\n      document.querySelectorAll('[data-i18n]').forEach(el => {\n        const k = el.getAttribute('data-i18n');\n        if (t[k] !== undefined) el.textContent = t[k];\n      });\n      document.querySelectorAll('[data-i18n-html]').forEach(el => {\n        const k = el.getAttribute('data-i18n-html');\n        if (t[k] !== undefined) el.innerHTML = t[k];\n      });\n      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {\n        const k = el.getAttribute('data-i18n-placeholder');\n        if (t[k] !== undefined) el.setAttribute('placeholder', t[k]);\n      });\n      const sw = document.getElementById('langSwitcher');\n      if (sw) {\n        sw.textContent = t['lang-switch-to'];\n        sw.setAttribute('aria-label', lang === 'zh' ? 'Switch to English' : '切换到中文');\n      }\n      currentLang = lang;\n      this.currentLang = lang;\n      localStorage.setItem('lang', lang);\n    };\n    this.currentLang = currentLang;\n    applyLanguage(currentLang);\n\n    const sw = document.getElementById('langSwitcher');\n    if (sw) sw.addEventListener('click', () => applyLanguage(currentLang === 'zh' ? 'en' : 'zh'));\n\n    const navbar = document.getElementById('navbar');\n    const navLinks = Array.from(document.querySelectorAll('[data-nav]'));\n    const sections = navLinks.map(a => document.getElementById(a.getAttribute('data-nav'))).filter(Boolean);\n    const backToTop = document.getElementById('backToTop');\n    const navToggle = document.getElementById('navToggle');\n    const navLinksC = document.getElementById('navLinks');\n\n    const onScroll = () => {\n      const y = window.scrollY;\n      if (navbar) navbar.style.boxShadow = y > 60 ? '0 2px 24px rgba(13,33,55,0.1)' : 'none';\n      let cur = '';\n      sections.forEach(s => {\n        const top = s.offsetTop - 120;\n        if (y >= top && y < top + s.offsetHeight) cur = s.id;\n      });\n      navLinks.forEach(a => {\n        const on = a.getAttribute('data-nav') === cur;\n        a.style.color = on ? 'var(--gold)' : (a.getAttribute('data-nav') === 'mea' ? 'var(--text)' : 'var(--text)');\n        if (on) a.style.color = 'var(--gold)';\n      });\n      if (backToTop) {\n        if (y > 600) { backToTop.style.opacity = '1'; backToTop.style.visibility = 'visible'; backToTop.style.transform = 'translateY(0)'; }\n        else { backToTop.style.opacity = '0'; backToTop.style.visibility = 'hidden'; backToTop.style.transform = 'translateY(20px)'; }\n      }\n    };\n    window.addEventListener('scroll', onScroll);\n    onScroll();\n\n    if (navToggle && navLinksC) {\n      navToggle.addEventListener('click', () => navLinksC.classList.toggle('open'));\n      navLinks.forEach(a => a.addEventListener('click', () => navLinksC.classList.remove('open')));\n    }\n    if (backToTop) backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));\n\n    const obs = new IntersectionObserver((entries) => {\n      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });\n    }, { threshold: 0.08 });\n    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));\n\n    if (this.props.heroAnimation !== false) {\n      const canvas = document.getElementById('heroCanvas');\n      if (canvas) {\n        const ctx = canvas.getContext('2d');\n        let width, height, particles = [];\n        const colors = ['26,58,92', '58,123,213', '184,134,30'];\n        const resize = () => { width = canvas.width = canvas.parentElement.offsetWidth; height = canvas.height = canvas.parentElement.offsetHeight; };\n        resize();\n        window.addEventListener('resize', resize);\n        class P {\n          constructor() { this.reset(); }\n          reset() { this.x = Math.random()*width; this.y = Math.random()*height; this.size = Math.random()*1.6+0.6; this.sx = (Math.random()-0.5)*0.5; this.sy = (Math.random()-0.5)*0.5; this.o = Math.random()*0.28+0.08; this.c = colors[Math.floor(Math.random()*colors.length)]; }\n          update() { this.x += this.sx; this.y += this.sy; if (this.x<0||this.x>width||this.y<0||this.y>height) this.reset(); }\n          draw() { ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fillStyle = 'rgba('+this.c+','+this.o+')'; ctx.fill(); }\n        }\n        for (let i=0;i<90;i++) particles.push(new P());\n        const lines = () => {\n          const md = 130;\n          for (let i=0;i<particles.length;i++) for (let j=i+1;j<particles.length;j++) {\n            const dx = particles[i].x-particles[j].x, dy = particles[i].y-particles[j].y, d = Math.sqrt(dx*dx+dy*dy);\n            if (d<md) { ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.strokeStyle = 'rgba(26,58,92,'+((1-d/md)*0.1)+')'; ctx.lineWidth = 0.5; ctx.stroke(); }\n          }\n        };\n        const animate = () => { ctx.clearRect(0,0,width,height); particles.forEach(p=>{p.update();p.draw();}); lines(); this._raf = requestAnimationFrame(animate); };\n        animate();\n      }\n    }\n\n    const form = document.getElementById('contactForm');\n    if (form) {\n      form.addEventListener('submit', (e) => {\n        e.preventDefault();\n        const btn = document.getElementById('formBtn');\n        const orig = btn.textContent;\n        btn.textContent = this.translations[this.currentLang]['form-success'];\n        btn.disabled = true; btn.style.background = '#16a34a';\n        setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.style.background = ''; form.reset(); }, 3000);\n      });\n    }\n  }\n\n  componentWillUnmount() { if (this._raf) cancelAnimationFrame(this._raf); }\n\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
