<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a843"/>
      <stop offset="100%" style="stop-color:#b8861e"/>
    </linearGradient>
    <linearGradient id="blue1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a7bd5"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
  </defs>
  <!-- 图标：六边形基石 + AI节点 -->
  <g transform="translate(70,70)">
    <!-- 外六边形 -->
    <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" fill="none" stroke="url(#gold1)" stroke-width="2.5"/>
    <!-- 内六边形 -->
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" fill="none" stroke="url(#blue1)" stroke-width="2"/>
    <!-- 中心菱形 -->
    <polygon points="0,-12 10,0 0,12 -10,0" fill="url(#gold1)" opacity="0.9"/>
    <!-- 连线节点 -->
    <circle cx="0" cy="-30" r="3" fill="#3a7bd5"/>
    <circle cx="26" cy="-15" r="3" fill="#3a7bd5"/>
    <circle cx="26" cy="15" r="3" fill="#3a7bd5"/>
    <circle cx="0" cy="30" r="3" fill="#3a7bd5"/>
    <circle cx="-26" cy="15" r="3" fill="#3a7bd5"/>
    <circle cx="-26" cy="-15" r="3" fill="#3a7bd5"/>
    <!-- 连线 -->
    <line x1="0" y1="-12" x2="0" y2="-30" stroke="#3a7bd5" stroke-width="1" opacity="0.6"/>
    <line x1="10" y1="0" x2="26" y2="-15" stroke="#3a7bd5" stroke-width="1" opacity="0.6"/>
    <line x1="10" y1="0" x2="26" y2="15" stroke="#3a7bd5" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="12" x2="0" y2="30" stroke="#3a7bd5" stroke-width="1" opacity="0.6"/>
    <line x1="-10" y1="0" x2="-26" y2="15" stroke="#3a7bd5" stroke-width="1" opacity="0.6"/>
    <line x1="-10" y1="0" x2="-26" y2="-15" stroke="#3a7bd5" stroke-width="1" opacity="0.6"/>
  </g>
  <!-- 公司名称 -->
  <text x="130" y="55" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="28" font-weight="bold" fill="#1a3a5c">基石智勘</text>
  <text x="130" y="82" font-family="Arial, sans-serif" font-size="13" fill="#3a7bd5" letter-spacing="2">Rukn GeoExplore</text>
  <text x="130" y="102" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#888">AI 驱动 · 智慧能源勘查</text>
</svg>